<style>
        @keyframes subtle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes progress-loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .animate-subtle-bounce {
            animation: subtle-bounce 2s ease-in-out infinite;
        }

        .loading-bar-inner {
            animation: progress-loading 2.5s ease-in-out infinite;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background-color: #f7d700;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col items-center justify-between min-h-screen">
<!-- Top Spacing -->
<div class="h-1/4"></div>
<!-- Main Branding Area -->
<main class="flex flex-col items-center justify-center flex-grow text-center px-margin-mobile">
<!-- Brand Identity Container -->
<div class="animate-subtle-bounce flex flex-col items-center">
<!-- Icon Symbol -->
<div class="mb-unit-4 flex items-center justify-center bg-on-background rounded-[24px] p-unit-3 shadow-xl transform rotate-3">
<span class="material-symbols-outlined text-[64px] text-primary-container" style="font-variation-settings: 'FILL' 1;">
                    shopping_basket
                </span>
</div>
<!-- Brand Name (Typography: font-display-lg) -->
<h1 class="font-display-lg text-display-lg text-on-background tracking-tighter mb-unit-1">
                Premium Grocery
            </h1>
<!-- Value Prop (Typography: font-title-lg) -->
<p class="font-title-lg text-title-lg text-on-background/80 max-w-[280px]">
                Groceries delivered in <span class="text-on-background font-extrabold underline decoration-4 decoration-white/30">10 minutes</span>
</p>
</div>
</main>
<!-- Bottom Loading Section -->
<footer class="w-full flex flex-col items-center pb-unit-6 px-margin-mobile">
<!-- Progress Bar Background -->
<div class="w-48 h-1.5 bg-on-background/10 rounded-full overflow-hidden relative mb-unit-3">
<!-- Animated Loading Fill -->
<div class="loading-bar-inner absolute top-0 left-0 h-full bg-on-background rounded-full"></div>
</div>
<!-- System Status Label (Typography: font-label-sm) -->
<div class="flex items-center gap-unit-1 text-on-background/60 font-label-sm text-label-sm uppercase tracking-[0.1em]">
<span class="w-2 h-2 rounded-full bg-delivery-green inline-block animate-pulse"></span>
            Initializing secure checkout...
        </div>
<!-- Platform Signature -->
<div class="mt-unit-6 opacity-40">
<span class="font-label-sm text-label-sm text-on-background">Part of the Modern Express Network</span>
</div>
</footer>
<!-- Background Decorative Elements (Bento-style silhouettes) -->
<div class="fixed top-[-5%] left-[-10%] opacity-[0.03] pointer-events-none transform -rotate-12">
<span class="material-symbols-outlined text-[320px]">grocery</span>
</div>
<div class="fixed bottom-[15%] right-[-5%] opacity-[0.03] pointer-events-none transform rotate-12">
<span class="material-symbols-outlined text-[280px]">nutrition</span>
</div>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simulated loading transition logic
            const bar = document.querySelector('.loading-bar-inner');
            const status = document.querySelector('.text-on-background\\/60');
            
            const messages = [
                "Initializing secure checkout...",
                "Locating nearest store...",
                "Optimizing delivery route...",
                "Updating fresh inventory..."
            ];
            
            let i = 0;
            setInterval(() => {
                i = (i + 1) % messages.length;
                status.innerHTML = `<span class="w-2 h-2 rounded-full bg-delivery-green inline-block animate-pulse"></span> ${messages[i]}`;
            }, 1200);

            // Optional: Redirect or transition after splash
            /*
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 5000);
            */
        });
    </script>
