<!-- Atmosphere/Interaction Script -->
<script>
        // Simple entry animation for text elements
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('h1, p, .flex.gap-2');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 * (index + 1));
            });
        });
    </script>
